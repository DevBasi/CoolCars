# ============================================================================
# Language File: English (en)
# ----------------------------------------------------------------------------
# Purpose:
# This file contains all user-facing texts for the plugin.
#
# Placeholder rules:
# {0}, {1}, {2} ... are dynamic placeholders inserted by code.
# Common usage:
# - {0} in most messages = prefix (from key `prefix`)
# - other indexes are message-specific values (UUID, liters, coordinates, etc.)
#
# Color rules:
# - Use '&' color codes (e.g. &a, &c, &7, &8).
# - Keep placeholders untouched when translating.
# ============================================================================

# [GLOBAL PREFIX]
# Shown at the start of most chat messages.
prefix: "&8[&6Cars&8] &7"

# [COMMAND: GENERIC]
# Message shown when command is executed from console/non-player sender.
command.only-player: "{0}Only players can use this command."
command.no-permission: "{0}&cYou do not have permission to do this."

# [COMMAND USAGE HINTS]
# Help lines shown when user enters incomplete/invalid command args.
command.usage.spawncar: "{0}Usage: /car spawn <model>"
command.usage.fuel: "{0}Usage: /fuel give [liters] | /fuel set <liters>"
command.usage.repair: "{0}Usage: /repair give [units] | /repair set <units>"
command.usage.car: "{0}Usage: /car help | /car spawn <model> | /car info <uuid> | /car list | /car remove <uuid> | /car reload | /car repairhitbox <on|off>"
command.usage.lang: "{0}Usage: /lang set <en|ru> | /lang auto | /lang server <en|ru> | /lang"

# [SPAWN FLOW]
# Success/failure messages for spawning and initial mounting.
spawn.success: "{0}&aCar spawned."
