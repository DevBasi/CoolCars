sounds:
  enabled: true
  category: PLAYERS
  # Continuous engine sounds are emitted from car world position (not player),
  # so nearby players hear car movement/idle/repair/refuel naturally by distance.
  transition:
    driving-to-idle-delay-ticks: 2
    idle-to-driving-delay-ticks: 2
  spatial:
    # Floor loudness at max radius (0.0-0.95). Lower = more natural fade.
    min-volume-factor: 0.16
    # Full-volume bubble around vehicle before fade starts.
    near-distance-blocks: 2.0
    # Falloff curve power (>1 = faster fade with distance, <1 = slower fade).
    falloff-curve-power: 1.25

  events:
    seat-open:
      enabled: true
      key: "coolcars.open"
      volume: 1.00
      pitch: 1.00
      radius: 18.0
      interval-ticks: 6
      min-speed: 0.0
      drift-threshold: 0.0
      min-slip-speed: 0.0
      min-steer: 0.0
      cooldown-ticks: 0
      require-moving: false
      prevent-overlap: true

    seat-close:
      enabled: true
      key: "coolcars.close"
      volume: 0.95
      pitch: 1.00
      radius: 18.0
      interval-ticks: 6
      min-speed: 0.0
      drift-threshold: 0.0
      min-slip-speed: 0.0
      min-steer: 0.0
      cooldown-ticks: 0
      require-moving: false
